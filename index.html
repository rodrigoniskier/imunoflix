<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImunoFlix | Aprenda Imunologia</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash-logo-view" class="splash-screen">
    <h1 class="splash-logo">IMUNOFLIX</h1>
</div>
<div id="splash-tudum-view" class="splash-screen" style="display: none;">
    <img src="eme.jpg" alt="Logo ImunoFlix" class="splash-m-img" onerror="this.style.display='none'">
</div>

<div id="app-container">
    <div id="browse-view" class="view">
        <header id="main-header">
            <div class="header-left">
                <div class="logo">Imuno<span>flix</span></div>
            </div>
            <div class="user-nav">
                <a href="#" class="nav-icon" aria-label="Buscar"><i class="ph-bold ph-magnifying-glass"></i></a>
                <a href="#" class="nav-icon" aria-label="Notificações"><i class="ph-bold ph-bell"></i></a>
                <div class="user-profile">
                    <img src="foto.jpg" alt="Perfil" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png'">
                    <span>Estudante</span>
                    <i class="ph-bold ph-caret-down"></i>
                </div>
            </div>
        </header>

        <section class="hero-section" style="background-image: url('https://images.unsplash.com/photo-1576086213369-97a306d36557?q=80&w=2000&auto=format&fit=crop');">
            <div class="hero-content">
                <h1>O Sistema Imune</h1>
                <div class="hero-meta">
                    <span class="stars" aria-label="5 de 5 estrelas">★★★★★</span>
                    <span class="meta-item">Novo</span>
                    <span class="meta-item age-rating">L</span>
                </div>
                <p class="description">Explore as incríveis defesas do corpo humano. Entenda como nossas células trabalham incansavelmente para nos proteger de invasores e manter a nossa saúde.</p>
                <div class="hero-buttons">
                    <button class="btn btn-primary" id="start-journey-btn"><i class="ph-bold ph-play"></i> Assistir Agora</button>
                    <button class="btn btn-secondary" id="add-list-btn"><i class="ph-bold ph-plus"></i> Minha Lista</button>
                </div>
            </div>
        </section>

        <main class="catalog-container" id="catalogo">
            </main>
    </div>

    <div id="detail-view" class="view">
        <button class="menu-toggle-btn" id="menu-toggle">☰</button>
        <nav id="episode-menu">
            </nav>
        <div class="detail-main-content">
            <button class="back-button" id="back-to-browse-btn" title="Voltar ao Catálogo">
                <i class="ph-bold ph-arrow-left"></i>
            </button>
            
            <div class="video-wrapper">
                <iframe id="youtube-player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="detail-content" id="detail-content-container">
                <h2 id="video-title">Título do Vídeo</h2>
                <p id="video-description">Descrição do vídeo vai aparecer aqui.</p>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
